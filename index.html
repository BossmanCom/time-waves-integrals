<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Waves — Classic Integrals</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0e17;
      color: #e0e6f0;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1a2035;
      background: #0d111c;
    }

    h1 {
      font-size: 1.15rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    select, button {
      background: #1a2035;
      color: #e0e6f0;
      border: 1px solid #2a334d;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    select:hover, button:hover {
      background: #242b42;
    }

    main {
      flex: 1;
      display: flex;
      position: relative;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .info {
      position: absolute;
      bottom: 20px;
      left: 24px;
      background: rgba(13, 17, 28, 0.85);
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #1a2035;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .value {
      font-size: 1.3rem;
      font-weight: 600;
      color: #7dd3fc;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Time Waves</h1>
    <div class="controls">
      <select id="functionSelect">
        <option value="gaussian">Gaussian ∫ e^{-x²} dx</option>
        <option value="lorentzian">Lorentzian ∫ 1/(x²+1) dx</option>
        <option value="sinc">Dirichlet ∫ sin(x)/x dx</option>
      </select>
      <button id="playBtn">Play</button>
      <button id="resetBtn">Reset</button>
    </div>
  </header>

  <main>
    <canvas id="canvas"></canvas>
    <div class="info">
      <div id="functionName">Gaussian</div>
      <div class="value" id="integralValue">0.0000</div>
      <div id="targetValue">Target: √π ≈ 1.77245</div>
    </div>
  </main>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Resize canvas to fill the main area
    function resize() {
      canvas.width = canvas.clientWidth * devicePixelRatio;
      canvas.height = canvas.clientHeight * devicePixelRatio;
      ctx.scale(devicePixelRatio, devicePixelRatio);
    }
    window.addEventListener('resize', resize);
    resize();

    // Placeholder - we will build the actual simulation next
    ctx.fillStyle = '#0b0e17';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#4b5563';
    ctx.font = '16px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('Canvas ready — simulation coming next', canvas.clientWidth / 2, canvas.clientHeight / 2);
  </script>
</body>
</html>
